<html>
    <head>
        <script src="/_sdk/telemetry_sdk.js">
        </script>
  <title>Just One More Block</title>
  <script src="https://cdn.tailwindcss.com/3.4.17">
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            }
        body 
        { 
            font-family: 'DM Sans', sans-serif; 
            overflow: hidden; 
            touch-action: none; 
            }
        canvas 
        { 
            display: block; 
            }
        .overlay 
        {
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            pointer-events: none;
        }
        .overlay.active 
        { 
            pointer-events: all; 
            }
        #score 
        {
            position: absolute; 
            top: 40px; 
            left: 50%; 
            transform: translateX(-50%);
            font-size: 72px; 
            font-weight: 900; 
            color: white; 
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            z-index: 10; 
            pointer-events: none;
        }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript">
  </script>
  <script src="/_sdk/data_sdk.js" type="text/javascript">
  </script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript">
  </script>
 </head>
 <body data-template-id="__page-root" class="w-full" style="height: calc(100 * min(var(--vh, 1vh), 1vh)); background: rgb(26, 26, 46);">
  <canvas id="game">
  </canvas>
  <div id="score">
   0
  </div>
  <div id="start-overlay" class="overlay active">
   <center><p data-template-id="tap-prompt" class="canva-text text-white text-2xl font-bold animate-pulse" 
   style="text-shadow: rgba(0, 0, 0, 0.4) 0px 2px 10px; color: rgb(255, 255, 255); font-weight: 700; font-style: normal; font-size: 24px;">
   Tap to Start :) <br> Made by Tayyaba Shaikh</p></center>
  </div>
  <div id="gameover-overlay" class="overlay" style="display:none;">
   <div class="text-center">
    <p data-template-id="gameover-title" class="canva-text text-white text-4xl font-black mb-2" 
    style="text-shadow: rgba(0, 0, 0, 0.4) 0px 2px 10px; color: rgb(255, 255, 255); font-weight: 900; font-style: normal; font-size: 40px;">
    Game Over :(</p>
    <p id="final-score" class="text-white text-xl opacity-80"></p>
    <p data-template-id="restart-prompt" class="canva-text text-white text-lg mt-6 animate-pulse opacity-70" 
    style="color: rgb(255, 255, 255); font-weight: 700; font-style: normal; font-size: 18px;">
    Retry :D </p>
   </div>
  </div>
  <script src="/_sdk/editing_sdk.js">
  </script>
  <script>
    (function() {
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const finalScoreEl = document.getElementById('final-score');

        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const PERFECT_THRESHOLD = 5;
        let stack = [];
        let current = null;
        let direction = 1;
        let speed = 3;
        let score = 0;
        let gameState = 'idle'; 
        let cameraY = 0;
        let targetCameraY = 0;
        let hue = 200;

        function blockColor(i) {
            return `hsl(${(hue + i * 12) % 360}, 60%, 55%)`;
        }
        function blockShadow(i) {
            return `hsl(${(hue + i * 12) % 360}, 50%, 40%)`;
        }

        const BLOCK_HEIGHT = 28;
        const BASE_WIDTH = 160;

        function initGame() {
            stack = [];
            score = 0;
            scoreEl.textContent = '0';
            hue = Math.random() * 360 | 0;
            cameraY = 0;
            targetCameraY = 0;
            speed = 3;
            stack.push({ x: W / 2 - BASE_WIDTH / 2, width: BASE_WIDTH, y: H - 80 });
            spawnBlock();
        }

        function spawnBlock() {
            const prev = stack[stack.length - 1];
            const w = prev.width;
            const y = prev.y - BLOCK_HEIGHT;
            current = { x: -w, width: w, y: y, moving: true };
            direction = 1;
            if (score > 10) speed = 3 + (score - 10) * 0.15;
            speed = Math.min(speed, 9);
        }

        function placeBlock() {
            if (!current) return;
            const prev = stack[stack.length - 1];
            const overlap = Math.min(current.x + current.width, prev.x + prev.width) - Math.max(current.x, prev.x);

            if (overlap <= 0) {
                gameState = 'over';
                finalScoreEl.textContent = 'Score: ' + score;
                gameoverOverlay.style.display = '';
                gameoverOverlay.classList.add('active');
                current = null;
                return;
            }

            const diff = Math.abs(current.x - prev.x);
            let placed;
            if (diff < PERFECT_THRESHOLD) {
                placed = { x: prev.x, width: prev.width, y: current.y };
            } else {
                const newX = Math.max(current.x, prev.x);
                placed = { x: newX, width: overlap, y: current.y };
            }

            stack.push(placed);
            score++;
            scoreEl.textContent = score;
            targetCameraY += BLOCK_HEIGHT;
            current = null;
            spawnBlock();
        }

        function update() {
            if (current && current.moving) {
                current.x += speed * direction;
                if (current.x + current.width > W + 50) direction = -1;
                if (current.x < -50) direction = 1;
            }
            cameraY += (targetCameraY - cameraY) * 0.1;
        }

        function draw() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            const h1 = (hue + score * 5) % 360;
            grad.addColorStop(0, `hsl(${h1}, 40%, 20%)`);
            grad.addColorStop(1, `hsl(${(h1 + 40) % 360}, 50%, 35%)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            ctx.translate(0, cameraY);

            for (let i = 0; i < stack.length; i++) {
                const b = stack[i];
                ctx.fillStyle = blockColor(i);
                ctx.fillRect(b.x, b.y, b.width, BLOCK_HEIGHT - 2);
                ctx.fillStyle = blockShadow(i);
                ctx.fillRect(b.x, b.y + BLOCK_HEIGHT - 4, b.width, 2);
            }

            if (current) {
                ctx.fillStyle = blockColor(stack.length);
                ctx.fillRect(current.x, current.y, current.width, BLOCK_HEIGHT - 2);
            }

            ctx.restore();
        }

        function loop() {
            if (gameState === 'playing') update();
            draw();
            requestAnimationFrame(loop);
        }

        function handleTap() {
            if (gameState === 'idle') {
                gameState = 'playing';
                startOverlay.style.display = 'none';
                initGame();
            } else if (gameState === 'playing') {
                placeBlock();
            } else if (gameState === 'over') {
                gameoverOverlay.style.display = 'none';
                gameoverOverlay.classList.remove('active');
                gameState = 'playing';
                initGame();
            }
        }

        document.addEventListener('pointerdown', handleTap);
        document.addEventListener('keydown', (e) => { if (e.code === 'Space') handleTap(); });

        loop();
    })();
    </script>
